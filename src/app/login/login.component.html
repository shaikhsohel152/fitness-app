<div class="login-page">

  <!-- LEFT SIDE -->
  <div class="login-banner">

    <div class="overlay">

      <h1>GYMGEARPRO</h1>

      <p>
        Train Hard.
        Stay Strong.
        Transform Yourself.
      </p>

    </div>

  </div>

  <!-- RIGHT SIDE -->
  <div class="login-form-area">

    <div class="login-card">

      <div class="header">
        <h2>Welcome Back</h2>
        <p>Access your fitness dashboard</p>
      </div>

      <!-- STEP 1 -->
      <div *ngIf="step === 1" class="form">

        <input
          type="email"
          placeholder="Email Address"
          [(ngModel)]="email"
        />

        <button
          class="primary-btn"
          (click)="sendOtp()"
          [disabled]="loading">

          {{ loading ? 'Sending OTP...' : 'Send OTP' }}

        </button>

      </div>

      <!-- STEP 2 -->
      <div *ngIf="step === 2" class="form">

        <p class="otp-text">
          OTP sent to <b>{{ email }}</b>
        </p>

        <input
          type="text"
          placeholder="Enter OTP"
          [(ngModel)]="otp"
        />

        <input
          type="text"
          placeholder="Full Name"
          [(ngModel)]="name"
        />

        <button
          class="primary-btn"
          (click)="verifyOtp()"
          [disabled]="loading">

          {{ loading ? 'Verifying...' : 'Verify & Login' }}

        </button>

        <button
          class="link-btn"
          (click)="resendOtp()">

          Resend OTP

        </button>

      </div>

    </div>

  </div>

</div>
