<!-- HERO SECTION -->
<section class="hero-section d-flex align-items-center justify-content-center text-center">
  <div class="brand-box d-flex align-items-center justify-content-center">
    <i class="fas fa-dumbbell me-2 text-warning"></i>
    <h1 class="gym-title">GYMGEARPRO</h1>
  </div>
</section>

<!-- FEATURES SECTION -->
<section class="features-section py-5">
  <div class="container">

    <h2 class="section-title text-center mb-5">
      Why Choose <span>GYMGEARPRO</span>
    </h2>

    <div class="row g-4">
      <div class="col-lg-3 col-md-6 col-sm-12" *ngFor="let item of features">

        <div class="feature-box h-100">
          <div class="feature-img">
            <img [src]="item.image" alt="gym">
            <div class="overlay"></div>
          </div>

          <div class="feature-content text-center p-3">
            <h4>{{ item.title }}</h4>
            <p>{{ item.desc }}</p>
          </div>
        </div>

      </div>
    </div>

  </div>
</section>

<!-- JOIN GYM SECTION -->
<section class="join-gym-section py-5">
  <div class="container">
    <div class="row align-items-center justify-content-center">

      <!-- LEFT TEXT -->
      <div class="col-lg-6 col-md-10 text-center text-lg-start mb-4">
        <h2 class="join-title">
          Transform Your <br>
          <span>Body & Mind</span>
        </h2>

        <p class="join-desc">
          Train in a premium environment with modern equipment,
          expert trainers and unstoppable motivation.
        </p>
      </div>

      <!-- FORM -->
      <div class="col-lg-5 col-md-8 col-sm-12">

        <div class="join-card">

          <h3 class="text-center mb-4 text-light">
            Join Our Personal Training 💪
          </h3>

          <form [formGroup]="joinForm" (ngSubmit)="OnJoingym()">

            <!-- NAME -->
            <input
            type="text"
            class="form-control mb-2"
            placeholder="Full Name"
            formControlName="fullName"
            >

            <!-- EMAIL -->
            <input
            type="email"
            class="form-control mb-2"
            placeholder="Email Address"
            formControlName="email"
            >

            <!-- PHONE -->
            <input
            type="text"
            class="form-control mb-2"
            placeholder="Phone Number"
            formControlName="phone"
            maxlength="10"
            >

            <!-- TRAINING -->
            <select
            class="form-control mb-3"
            formControlName="training"
            >

              <option value="" disabled selected>
                Personal Training?
              </option>

              <option value="Yes">Yes</option>
              <option value="No">No</option>

            </select>

            <!-- BUTTON -->
            <button
            type="submit"
            class="join-btn w-100"
            [disabled]="joinForm.invalid"
            >
              Become a Member
            </button>

          </form>

        </div>

      </div>

    </div>
  </div>
</section>
<!-- Footer  -->
<footer class="short-footer bg-dark text-light mt-5 py-3">
  <div class="container d-flex flex-column flex-md-row justify-content-between align-items-center">

    <div class="mb-2 mb-md-0">
      <strong><i class="fas fa-dumbbell me-2 text-warning"></i>GymGear Pro</strong> &copy; 2026. All rights reserved.
    </div>
