<div class="profile">

  <!-- HERO -->
  <section class="profile-hero">

    <div class="user-box">

      <div class="avatar">
        {{ user?.name?.charAt(0) || 'U' }}
      </div>

      <div class="user-info">
        <h2>{{ user?.name }}</h2>
        <p>{{ user?.email }}</p>
        <span class="badge">Premium Member</span>
      </div>

    </div>

  </section>

  <!-- BODY -->
  <section class="profile-body container">

    <!-- LEFT -->
    <aside class="sidebar">

      <div class="card">
        <h3>Quick Actions</h3>

        <button (click)="goToOrders()">🛒 My Orders</button>
        <button routerLink="/product">🏋️ Shop Products</button>
        <button class="danger" (click)="logout()">🚪 Logout</button>
      </div>

    </aside>

    <!-- RIGHT -->
    <main class="content">

      <!-- PROFILE CARD -->
      <div class="card">
        <h3>Profile Info</h3>

        <div class="row">
          <span>Name</span>
          <b>{{ user?.name }}</b>
        </div>

        <div class="row">
          <span>Email</span>
          <b>{{ user?.email }}</b>
        </div>

      </div>

      <!-- CONTACT -->
      <div class="card">
        <h3>Contact Number</h3>

        <input
          type="text"
          [(ngModel)]="addressInput.phone"
          placeholder="Enter phone number"
        />

        <button (click)="saveAddress()">Save Contact</button>
      </div>

      <!-- ADDRESS -->
      <div class="card">
        <h3>Delivery Address</h3>

        <input [(ngModel)]="addressInput.address" placeholder="Address">
        <input [(ngModel)]="addressInput.city" placeholder="City">
        <input [(ngModel)]="addressInput.pincode" placeholder="Pincode">

        <button (click)="saveAddress()">Save Address</button>
      </div>

    </main>

  </section>

  <!-- FOOTER -->
  <footer class="short-footer text-light py-3">
  <div class="container d-flex flex-column flex-md-row justify-content-between align-items-center">
    
    <div class="mb-2 mb-md-0">
      <strong><i class="fas fa-dumbbell me-2 text-warning"></i>GymGear Pro</strong> &copy; 2026. All rights reserved.
    </div>

  </div>
</footer>

</div>
